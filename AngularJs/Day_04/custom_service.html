<!DOCTYPE html>
<html ng-app="myapp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="myctrl">
    <h2>{{message}}</h2>
    <script>
        var app = angular.module("myapp",[]);
        app.service("welcomeService",function(){
            this.getMessage= function(){
                return "welcome to the AngularJS Custom Service";
            };

        });
        app.controller("myctrl",function($scope,welcomeService){
            $scope.message=welcomeService.getMessage();
        });
    </script>
    
</body>
</html>
