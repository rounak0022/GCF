<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>AngularJS Basic Routing</title>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- AngularJS Routing -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>

    <style>

body{
font-family:Arial;
margin:30px;
}

a{
background:rgb(22, 154, 216);
color:white;
padding:10px 20px;
text-decoration:none;
margin-right:10px;
border-radius:5px;
}

.card{

margin-top:30px;
border:1px solid gray;
padding:20px;
border-radius:10px;

}

table{

border-collapse:collapse;
width:100%;

}

table,th,td{
border:1px solid black;
padding:10px;
}

</style>

</head>
<body>
    <h2>Angular JS Dynamic Routing</h2>

    <a href="#!/student/101">Rahul</a>
    <a href="#!/student/102">Student 102</a>
    <a href="#!/student/103">Student 103</a>
    <div class="card" ng-view></div>

    <script>
        var app=angular.module("myApp",["ngRoute"]);
        app.config(function($routeProvider){
            $routeProvider

           

            .when("/students/:id",{
                templateUrl:"students.html",
                controller:"StudentController"
                })
            .otherwise({
                redirectTo:"/"
            });
        });

        app.controller("StudentController",function($scope,$routeParams){
            $scope.studentId = $routeParams.id;
              
            
        });
    </script>
</body>
</html>
