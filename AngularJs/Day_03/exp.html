<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="angular.min.js"></script>
</head>
<body ng-app ng-init="marks=78;
student={name:'Riya', dept: 'cse'};
subjects= ['Maths', 'Physics', 'AI']">

<p>First subject : {{subjects[0] }}</p>
<p>Result: {{marks >= 40 ? 'Pass' : 'Fail' }}</p>
<p>Average : {{(marks+85)/2 }}</p>

   
    
</body>
</html>
