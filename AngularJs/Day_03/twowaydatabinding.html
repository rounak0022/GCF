<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="angular.min.js"></script>
</head>
<body ng-app>
    <h3>Two way Data Binding</h3>

    <!-- user-Input -->
     <input type="text" ng-model="name" placeholder="Enter your name: ">

     <!-- display data -->
      <p>Hello {{name}}</p>
</body>
</html>
