<!DOCTYPE html>
<html lang="en" ng-app = "markApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="markController">
    <h2>Marks Calculator</h2>

    Maths
    <input type="number" ng-model="maths" placeholder="Enter Maths Marks"><br>
    Science
    <input type="number" ng-model="science" placeholder="Enter Science Marks"><br>
    English
    <input type="number" ng-model="english" placeholder="Enter English Marks"><br>
    <h3>Total Marks: {{totalMarks}}</h3>

    <button ng-click="calculate()">Calculate</button>

    <script src="marks.js"></script>
    
</body>
</html>
