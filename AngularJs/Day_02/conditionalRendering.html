<!DOCTYPE html>
<html lang="en" ng-app="app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="stdCtrl">
    <h2>student Login</h2>

    <input type="checkbox" ng-model="isLoggedIn">Login <br>

    <hr>
    <!-- ng-show display an element when the condition is true -->
    <h3 ng-show="isLoggedIn">
        Welcome student, You are logged in successfully!
    </h3>
    
    <script>
        var app=angular.module('app',[]);

        app.controller('stdCtrl',function($scope){
            $scope.isLoggedIn = false;
        })
    </script>
</body>
</html>
